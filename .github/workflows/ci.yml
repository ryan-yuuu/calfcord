# Continuous integration for pushes to main and pull-requests against main.
#
# Three jobs run in parallel:
#   lint  — ruff check. Advisory only (``continue-on-error: true``)
#           while we work down the 25 pre-existing baseline errors.
#           A red ✗ surfaces in the PR check list but does not block
#           merge.
#   test  — pytest with coverage. Hard-gates: any failing test fails CI
#           (coverage is reported, not gated). Also publishes the coverage
#           badge/data via python-coverage-comment-action; the companion
#           ``coverage.yml`` posts the comment for fork/Dependabot PRs.
#   build — docker build (no push). Catches Dockerfile drift even when
#           Python tests pass.
#
# Concurrency: pull-request runs cancel themselves when superseded by a
# newer commit on the same PR branch, so we don't burn minutes verifying
# stale code.
#
# Security: this workflow uses no untrusted user input (no
# github.event.issue.*, github.event.pull_request.title/body, etc.) in
# ``run:`` steps, so the workflow-injection patterns documented at
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
# do not apply.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    # The codebase ships with 25 pre-existing ruff errors that are
    # being cleared in a follow-up cleanup pass. ``continue-on-error``
    # makes the job advisory rather than gating: a non-zero exit
    # surfaces in the PR check list (red ✗) but does not block merge.
    # Drop this flag once the baseline is zero.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv (+ Python 3.12)
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          # Cache the uv-managed venv + downloads keyed on uv.lock so
          # repeat runs don't redownload every dependency.
          enable-cache: true
      - name: Run ruff
        # ``uvx`` keeps ruff out of the project deps; mirrors the local
        # developer workflow documented in CONTRIBUTING.md.
        run: uvx ruff check .

  test:
    name: pytest
    runs-on: ubuntu-latest
    # Test EVERY minor version in the supported window — the
    # requires-python floor (3.12) through the version the Docker image
    # ships (3.14), inclusive. A matrix lists discrete versions (not a
    # range), so 3.13 is named explicitly; omitting it would leave an
    # untested gap where intermediate-release changes (e.g. the 3.13
    # stdlib ``audioop`` removal) could hide. One job definition fans out
    # into parallel legs — we don't hand-write a job per version.
    # ``fail-fast: false`` lets every leg's result land even if one fails,
    # so a single-version break doesn't mask the others.
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    # Elevated for THIS job only (the workflow default is ``contents: read``).
    # python-coverage-comment-action needs ``contents: write`` to commit the
    # badge + coverage data to its data branch
    # (``python-coverage-comment-action-data``) on pushes to main, and
    # ``pull-requests: write`` to post the coverage comment on same-repo PRs.
    # Fork and Dependabot PRs run with a read-only token regardless (GitHub
    # forces this); for those, the action writes a comment artifact that the
    # trusted ``coverage.yml`` workflow posts via ``workflow_run``.
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - name: Set up uv (+ Python ${{ matrix.python-version }})
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run pytest with coverage
        # Coverage config lives in pyproject.toml ([tool.coverage.run]). This
        # writes the .coverage file the action consumes below.
        run: uv run pytest -q --cov --cov-report=term-missing
      - name: Coverage comment
        id: coverage_comment
        # Publish the badge + comment from ONE matrix leg only. Running the
        # coverage action on every interpreter would race to commit the data
        # branch, post duplicate comments, and collide on the upload-artifact
        # name below. 3.12 (the requires-python floor) is the canonical
        # reporter, keeping the badge stable across matrix changes.
        if: matrix.python-version == '3.12'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          # Thresholds set badge colour only; they do NOT gate CI.
          MINIMUM_GREEN: 90
          MINIMUM_ORANGE: 70
      - name: Store coverage comment (for fork / Dependabot PRs)
        uses: actions/upload-artifact@v7
        if: matrix.python-version == '3.12' && steps.coverage_comment.outputs.COMMENT_FILE_WRITTEN == 'true'
        with:
          name: python-coverage-comment-action
          path: python-coverage-comment-action.txt

  build:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Build calfcord image
        # No ``push``; this job exists to catch Dockerfile breakage early.
        # ``type=gha`` cache keeps subsequent runs cheap.
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

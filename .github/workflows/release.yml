# Release workflow: triggered on ``v*`` tag pushes (e.g. ``v0.1.0``).
#
# Builds a multi-arch (linux/amd64 + linux/arm64) image and pushes to
# GHCR at ``ghcr.io/ryan-yuuu/calfcord``. amd64 covers Intel Macs and
# most Linux servers / cloud VMs; arm64 covers Apple Silicon Macs
# running Docker Desktop. arm64 builds via QEMU emulation (~5-10 min);
# amd64 is native (~2 min). No other architectures are targeted in v1.
#
# A GitHub Release is created with auto-generated release notes drawn
# from the conventional-commit messages between the previous tag and
# this one.
#
# Security: this workflow uses no untrusted user input (no
# github.event.issue.*, github.event.pull_request.title/body,
# github.event.head_commit.message, etc.) in ``run:`` steps. The
# ``github.actor`` and ``github.repository`` values that DO appear are
# trusted GitHub metadata. The workflow-injection patterns at
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/
# do not apply.

name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write    # create GitHub Release
  packages: write    # push to ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so release-notes generation can walk back to
          # the previous tag for the diff range.
          fetch-depth: 0

      - name: Set up QEMU
        # Enables emulated linux/arm64 builds on the amd64 runner.
        uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        # ``metadata-action`` derives the canonical set of tags for a
        # semver release: full ``vX.Y.Z``, the bare ``X.Y.Z``, and the
        # ``X.Y`` minor stream. ``:latest`` is gated on STABLE releases
        # only — ``v1.0.0`` updates ``:latest`` but ``v1.0.0-rc1``
        # does not. Without this predicate a pre-release would
        # silently downgrade ``docker pull ghcr.io/.../calfcord:latest``
        # for every consumer.
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        # ``generate_release_notes: true`` makes GitHub auto-generate
        # notes from PRs merged between the prior tag and this one.
        # Conventional commit prefixes (``feat:``, ``fix:``, ...) make
        # the auto-grouping readable.
        #
        # SHA-pinned: this is the only third-party Marketplace action
        # in the release workflow (the rest live under docker/ and
        # actions/ orgs maintained by Docker and GitHub). It runs with
        # ``contents: write`` and ``packages: write`` permissions; a
        # compromised major tag would have meaningful blast radius.
        # Pin advances on each Dependabot upgrade.
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          generate_release_notes: true

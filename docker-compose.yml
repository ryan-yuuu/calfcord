# Calfcord deployment via Docker Compose.
#
# Three usage modes:
#
#   1. Full stack (recommended for first run):
#        cp .env.example .env       # fill in Discord + LLM creds
#        docker compose up --build
#      Brings up Tansu (the broker) plus the three calfcord services
#      (bridge, agent, tools). The ``--build`` flag rebuilds the
#      image after any Dockerfile change; omit it for plain restarts.
#
#   2. Native development (no Docker for the app):
#        Run the broker natively with ``calfcord broker`` (or point
#        ``CALF_HOST_URL`` at your own Kafka), then in separate terminals:
#        CALF_HOST_URL=localhost:9092 uv run calfkit-bridge   (agent / tools)
#      To run only the broker in Docker but the processes natively, advertise
#      the host address so host clients can reach it:
#        TANSU_ADVERTISE=localhost docker compose up tansu
#
#   3. Fully native:
#        Don't use this file at all. Point ``CALF_HOST_URL`` at your
#        own Kafka broker (or the native ``calfcord broker``) and run the uv
#        commands above.
#
# All modes share the same ``.env``. Per-service ``environment:`` blocks
# below override ``.env`` defaults for Docker-network-specific values
# (e.g. ``CALF_HOST_URL`` → ``tansu:9092``).
#
# Linux hosts with UID != 1000:
#   docker compose build \
#     --build-arg UID=$(id -u) --build-arg GID=$(id -g)
# so files the tools container writes to bind-mounted host dirs stay
# owned by the caller. macOS Docker Desktop handles UID translation
# automatically — no flags needed.

# Shared build + image config for the three calfcord services. YAML
# anchor (``&calfcord-base``) defined once and merged into each service
# below via ``<<: *calfcord-base`` so we don't re-declare the build
# context, image tag, env_file, and restart policy three times.
#
# The build args expand from shell env, defaulting to 1000 when unset.
# Linux users with a non-1000 UID set them once on the command line
# (see header).
x-calfcord-base: &calfcord-base
  build:
    context: .
    args:
      UID: ${UID:-1000}
      GID: ${GID:-1000}
  image: calfcord:latest
  env_file: .env
  restart: unless-stopped
  depends_on:
    tansu:
      condition: service_healthy

services:
  # Native Kafka-compatible broker — a single Rust binary. Memory storage is
  # ephemeral (no volume): topics/messages reset on restart, and calfcord
  # re-creates the topics it needs on startup (opt-in topic provisioning). For
  # persistence, switch --storage-engine to a libsql/SQLite or postgres URL.
  tansu:
    image: ghcr.io/tansu-io/tansu:latest
    container_name: calfcord-tansu
    command:
      - broker
      - --storage-engine=memory://tansu/
      - --listener-url=tcp://0.0.0.0:9092
      # Tansu advertises ONE address (no internal/external split like Redpanda).
      # In-network services dial ``tansu:9092`` (the default). To run only the
      # broker in Docker but the calfcord processes natively on the host,
      # advertise the host name: TANSU_ADVERTISE=localhost docker compose up tansu
      - --advertised-listener-url=tcp://${TANSU_ADVERTISE:-tansu}:9092
    ports:
      # Published so a host-native process (or TANSU_ADVERTISE=localhost) can
      # reach the broker; in-network services use the Docker network regardless.
      - "9092:9092"
    healthcheck:
      # A real Kafka handshake (lists topics). The image is distroless (no
      # shell, no rpk), so this is exec-form using the tansu binary at /tansu.
      test: ["CMD", "/tansu", "topic", "list"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  # The Discord gateway: normalizes inbound Discord events and posts
  # agent replies back as persona webhooks.
  #
  # No ``agents/*.md`` mount: after the control-plane split the bridge
  # bootstraps its registry by projecting from ``agent.state`` events.
  # Mounting the definitions here would be a misleading signal that the
  # bridge consults disk — it does not.
  bridge:
    <<: *calfcord-base
    container_name: calfcord-bridge
    command: calfkit-bridge
    environment:
      # Override .env so this service always dials the in-network
      # broker regardless of what the host-side .env says.
      CALF_HOST_URL: tansu:9092
    volumes:
      # Bridge-local SQLite transcript store (DISCORD_TRANSCRIPT_DB_PATH,
      # default state/transcripts.sqlite3): step transcripts + tool-call
      # replay. Persistent so transcripts survive restarts/redeploys; the
      # bridge is the sole reader/writer. WAL mode writes -wal/-shm sidecar
      # files alongside the DB, so the directory (not a single file) is
      # mounted. Distinct sub-path from the agent's state/agents/*.json, so
      # both services can share ./state without conflict.
      - ./state:/app/state

  # One or more LLM-backed agent nodes. Defaults to "all agents in one
  # Worker"; for crash isolation per agent, override ``command:`` to
  # ``calfkit-agent <name>`` in a compose.override.yml. No
  # ``container_name`` — operators may want ``docker compose up
  # --scale agent=N`` and compose auto-numbers the replicas.
  #
  # Codex subscription agents (``provider: openai-codex``) require an
  # OAuth login performed on the HOST before the container starts:
  #   uv run calfkit-auth codex login
  # Credentials persist to ``~/.calfcord/auth/`` on the host and are
  # bind-mounted into the container below. Docker auto-creates the
  # source directories if they don't exist yet, so non-Codex deploys
  # boot cleanly — a Codex-opted-in agent will simply fail at first
  # invocation with ``CodexNotLoggedInError`` until ``calfkit-auth
  # codex login`` runs on the host. See docs/codex-auth.md.
  agent:
    <<: *calfcord-base
    command: calfkit-agent
    environment:
      CALF_HOST_URL: tansu:9092
    volumes:
      # Read-write: the agent's control-plane sink rewrites its own
      # frontmatter via md_writer.update_thinking_effort when the
      # bridge publishes a SetThinkingEffortOp. The agent process is
      # the sole writer of agents/<id>.md; the bridge has
      # no mount here for that reason.
      - ./agents:/app/agents
      # Per-agent runtime state (channel subscriptions, .json files
      # under state/agents/). Read-write so the agent service can
      # persist updates.
      - ./state:/app/state
      # Codex subscription OAuth tokens. Shared with the host CLI
      # (``uv run calfkit-auth codex ...``) so token rotation that
      # happens inside the container writes back through the bind
      # mount and the host CLI always sees the latest state.
      - ${HOME}/.calfcord/auth:/home/calfcord/.calfcord/auth
      # Codex CLI system-prompt cache. Sharing with every other
      # container means a single ``calfkit-auth codex refresh-prompts``
      # primes all services' caches at once.
      - ${HOME}/.calfcord/codex_prompts:/home/calfcord/.calfcord/codex_prompts

  # The A2A + builtin-tool runner. This is the service that runs the
  # shell / fs / grep / glob / web tools — it has the trusted shared
  # workspace bind-mounted at /workspace.
  tools:
    <<: *calfcord-base
    container_name: calfcord-tools
    command: calfkit-tools
    environment:
      CALF_HOST_URL: tansu:9092
      CALFCORD_WORKSPACE_DIR: /workspace
      CALFKIT_A2A_CHANNEL_NAME: private-a2a
    volumes:
      # Trusted shared workspace: a DEDICATED ``./workspace`` dir,
      # read-write — NOT the whole project root. The builtin
      # fs/shell/grep/glob tools resolve their root from
      # ``CALFCORD_WORKSPACE_DIR=/workspace`` (see
      # ``tools/builtin/workspace.py``), so confining the mount to a
      # scratch dir sandboxes them there instead of exposing agents/*.md,
      # src/, state/, etc. The host dir is tracked via
      # ``./workspace/.gitkeep`` (its contents are gitignored), so the
      # mount point always exists and is owned by the host user (no
      # root-owned auto-create). To widen it (e.g. mount the whole
      # checkout or $HOME), drop a compose.override.yml next to this file
      # with a ``volumes:`` override.
      - ./workspace:/workspace

# No named broker volume: Tansu uses ephemeral memory storage, so there is no
# Kafka data to persist. calfcord re-creates its topics on startup (opt-in
# provisioning), so a fresh broker after ``docker compose down`` just works.
# For durable broker storage, switch the tansu service's --storage-engine to a
# libsql/SQLite or postgres URL and add a volume for it.

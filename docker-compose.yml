# Calfcord deployment via Docker Compose.
#
# Three usage modes:
#
#   1. Full stack (recommended for first run):
#        cp .env.example .env       # fill in Discord + LLM creds
#        docker compose up --build
#      Brings up Redpanda plus the four calfcord services (bridge,
#      agent, router, tools). The ``--build`` flag rebuilds the image
#      after any Dockerfile change; omit it for plain restarts.
#
#   2. Broker only (for native development):
#        docker compose up redpanda
#      Then in three or four terminals (or under a process supervisor):
#        CALF_HOST_URL=localhost:19092 uv run calfkit-bridge
#        CALF_HOST_URL=localhost:19092 uv run calfkit-agent
#        CALF_HOST_URL=localhost:19092 uv run calfkit-router
#        CALF_HOST_URL=localhost:19092 uv run calfkit-tools
#
#   3. Fully native:
#        Don't use this file at all. Point ``CALF_HOST_URL`` at your
#        own Kafka broker and run the uv commands above.
#
# All modes share the same ``.env``. Per-service ``environment:`` blocks
# below override ``.env`` defaults for Docker-network-specific values
# (e.g. ``CALF_HOST_URL`` → ``redpanda:9092``).
#
# Linux hosts with UID != 1000:
#   docker compose build \
#     --build-arg UID=$(id -u) --build-arg GID=$(id -g)
# so files the tools container writes to bind-mounted host dirs stay
# owned by the caller. macOS Docker Desktop handles UID translation
# automatically — no flags needed.

# Shared build + image config for the four calfcord services. YAML
# anchor (``&calfcord-base``) defined once and merged into each service
# below via ``<<: *calfcord-base`` so we don't re-declare the build
# context, image tag, env_file, and restart policy four times.
#
# The build args expand from shell env, defaulting to 1000 when unset.
# Linux users with a non-1000 UID set them once on the command line
# (see header).
x-calfcord-base: &calfcord-base
  build:
    context: .
    args:
      UID: ${UID:-1000}
      GID: ${GID:-1000}
  image: calfcord:latest
  env_file: .env
  restart: unless-stopped
  depends_on:
    redpanda:
      condition: service_healthy

services:
  # Single-binary Kafka-compatible broker. Dev-container mode is a
  # single broker with one partition by default; production deploys
  # would tune mode + smp + replication.
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    container_name: calfcord-redpanda
    command:
      - redpanda
      - start
      # Two listeners: ``internal://`` for in-network calfcord services
      # at redpanda:9092, ``external://`` published to the host at
      # localhost:19092 so native processes can reach the same broker
      # without re-routing.
      - --kafka-addr=internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr=internal://redpanda:9092,external://localhost:19092
      - --rpc-addr=0.0.0.0:33145
      - --advertise-rpc-addr=redpanda:33145
      - --mode=dev-container
      - --smp=1
      - --default-log-level=warn
    ports:
      # Only the external listener is published. Internal communication
      # between containerized services uses the Docker network and
      # needs no host port.
      - "19092:19092"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      # Forces an actual Kafka handshake against the internal listener.
      # Previously used ``rpk cluster health`` which queries the admin
      # API on port 9644 — that can flip "healthy" a few ms before the
      # Kafka listener at 9092 finishes binding, leading to calfcord
      # services starting and failing with "no broker available" errors.
      test: ["CMD-SHELL", "rpk cluster info --brokers=redpanda:9092"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  # The Discord gateway: normalizes inbound Discord events and posts
  # agent replies back as persona webhooks.
  #
  # No ``agents/*.md`` mount: after the control-plane split the bridge
  # bootstraps its registry with only the locally-built router and
  # projects the rest from ``agent.state`` events. Mounting the
  # definitions here would be a misleading signal that the bridge
  # consults disk — it does not.
  bridge:
    <<: *calfcord-base
    container_name: calfcord-bridge
    command: calfkit-bridge
    environment:
      # Override .env so this service always dials the in-network
      # broker regardless of what the host-side .env says.
      CALF_HOST_URL: redpanda:9092
    volumes:
      # Bridge-local SQLite transcript store (DISCORD_TRANSCRIPT_DB_PATH,
      # default state/transcripts.sqlite3): step transcripts + tool-call
      # replay. Persistent so transcripts survive restarts/redeploys; the
      # bridge is the sole reader/writer. WAL mode writes -wal/-shm sidecar
      # files alongside the DB, so the directory (not a single file) is
      # mounted. Distinct sub-path from the agent's state/agents/*.json, so
      # both services can share ./state without conflict.
      - ./state:/app/state

  # One or more LLM-backed agent nodes. Defaults to "all agents in one
  # Worker"; for crash isolation per agent, override ``command:`` to
  # ``calfkit-agent <name>`` in a compose.override.yml. No
  # ``container_name`` — operators may want ``docker compose up
  # --scale agent=N`` and compose auto-numbers the replicas.
  #
  # Codex subscription agents (``provider: openai-codex``) require an
  # OAuth login performed on the HOST before the container starts:
  #   uv run calfkit-auth codex login
  # Credentials persist to ``~/.calfcord/auth/`` on the host and are
  # bind-mounted into the container below. Docker auto-creates the
  # source directories if they don't exist yet, so non-Codex deploys
  # boot cleanly — a Codex-opted-in agent will simply fail at first
  # invocation with ``CodexNotLoggedInError`` until ``calfkit-auth
  # codex login`` runs on the host. See docs/codex-auth.md.
  agent:
    <<: *calfcord-base
    command: calfkit-agent
    environment:
      CALF_HOST_URL: redpanda:9092
    volumes:
      # Read-write: the agent's control-plane sink rewrites its own
      # frontmatter via md_writer.update_thinking_effort when the
      # bridge publishes a SetThinkingEffortOp. The agent process is
      # the sole writer of agents/<id>.md; the bridge and router have
      # no mount here for that reason.
      - ./agents:/app/agents
      # Per-agent runtime state (channel subscriptions, .json files
      # under state/agents/). Read-write so the agent service can
      # persist updates.
      - ./state:/app/state
      # Per-agent persistent memory. Pre-wired here so future memory
      # features write to a host-visible path instead of the
      # ephemeral container filesystem. The directory is created on
      # first write; .gitignore excludes its contents from source
      # control.
      - ./agent-memory:/app/agent-memory
      # Codex subscription OAuth tokens. Shared with the host CLI
      # (``uv run calfkit-auth codex ...``) so token rotation that
      # happens inside the container writes back through the bind
      # mount and the host CLI always sees the latest state.
      - ${HOME}/.calfcord/auth:/home/calfcord/.calfcord/auth
      # Codex CLI system-prompt cache. Sharing with every other
      # container means a single ``calfkit-auth codex refresh-prompts``
      # primes all services' caches at once.
      - ${HOME}/.calfcord/codex_prompts:/home/calfcord/.calfcord/codex_prompts

  # The ambient-channel router. Subscribes to discord.ambient.in,
  # selects which agent (if any) should handle a non-@-mentioned
  # message, and publishes the routing decision back to Kafka. See
  # docs/ambient-routing.md for the design. Single instance — the
  # router holds no per-channel state and a second instance would
  # only contend for partitions.
  #
  # No ``agents/*.md`` mount: the router definition is constructed in
  # code via build_router_definition(), and the per-invocation peer
  # roster arrives in ``deps`` from the bridge (which projects from
  # ``agent.state``). The router never touches the agent definitions
  # directory.
  router:
    <<: *calfcord-base
    container_name: calfcord-router
    command: calfkit-router
    environment:
      CALF_HOST_URL: redpanda:9092
    volumes:
      # Codex subscription auth — required when
      # ``CALFKIT_ROUTER_PROVIDER=openai-codex``. Without these mounts
      # the router boots and immediately fails with
      # ``CodexNotLoggedInError``. Mirrors the agent service's Codex
      # mounts; see that block for the rationale and the host-login
      # prerequisite (docs/codex-auth.md).
      - ${HOME}/.calfcord/auth:/home/calfcord/.calfcord/auth
      - ${HOME}/.calfcord/codex_prompts:/home/calfcord/.calfcord/codex_prompts

  # The A2A + builtin-tool runner. This is the service that runs the
  # shell / fs / grep / glob / web tools — it has the trusted shared
  # workspace bind-mounted at /workspace.
  tools:
    <<: *calfcord-base
    container_name: calfcord-tools
    command: calfkit-tools
    environment:
      CALF_HOST_URL: redpanda:9092
      CALFCORD_WORKSPACE_DIR: /workspace
      CALFKIT_A2A_CHANNEL_NAME: private-a2a
    volumes:
      # Trusted shared workspace: the entire project root, read-write.
      # Agents can read/edit any file in the checkout (agents/*.md,
      # src/, state/, etc.). Because this mount includes state/ at
      # /workspace/state, the tools service does NOT separately mount
      # ./state at /app/state — the data is already reachable through
      # the project-root mount. To narrow this (e.g. only a scratch
      # dir) or widen it (e.g. mount $HOME), drop a
      # compose.override.yml next to this file with a ``volumes:``
      # override.
      - .:/workspace

# Named volume for Redpanda data so it survives ``docker compose down``.
# ``docker compose down -v`` wipes it; that DESTROYS all Kafka topic
# history including in-flight A2A audit data — flag this in any deploy
# runbook.
volumes:
  redpanda-data:
